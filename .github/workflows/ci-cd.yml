# Optimized CI/CD: caching, parallel tests, SAST, dependency audit, Docker layer cache,
# blue/green smoke deploy with rollback, optional Discord + Snyk (see deliverable doc).
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  frontend-build:
    name: Frontend — install, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck & production build
        run: npm run build

      - name: Bundle size (monitoring signal)
        run: |
          echo "## Frontend bundle" >> "$GITHUB_STEP_SUMMARY"
          du -sh dist | tee -a "$GITHUB_STEP_SUMMARY"

  backend-test-shard:
    name: Backend pytest (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            paths: tests/test_auth.py tests/test_validation.py tests/test_task_cache.py
          - shard: 2
            paths: tests/test_support_api.py tests/test_tasks_api.py
          - shard: 3
            paths: tests/test_performance.py tests/test_api_exercise_2_suite.py

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest shard
        run: pytest ${{ matrix.paths }} -q

  e2e-playwright:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, tablet, mobile]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Tablet/mobile projects use iPad / iPhone device presets → WebKit (see playwright.config.ts).
      # Desktop uses Chromium only; install both so all matrix jobs have their browsers.
      - name: Install Playwright Chromium + WebKit
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium webkit --with-deps

      - name: Install Playwright browsers + system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          npx playwright install chromium webkit
          npx playwright install-deps chromium webkit

      - name: Run Playwright (single project)
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

  security-dependencies:
    name: Security — npm audit, pip-audit, Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm audit
        run: npm ci && npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt --desc

      - name: Bandit (SAST)
        continue-on-error: true
        run: |
          python -m pip install bandit
          bandit -r backend -x backend/tests -ll -f txt | tee bandit-report.txt
          echo "### Bandit" >> "$GITHUB_STEP_SUMMARY"
          cat bandit-report.txt >> "$GITHUB_STEP_SUMMARY"

  snyk:
    name: Snyk (optional)
    runs-on: ubuntu-latest
    if: vars.ENABLE_SNYK == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: snyk/actions/node@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  docker-images:
    name: Docker build + Trivy + blue/green smoke
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test-shard, e2e-playwright, security-dependencies]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (GH cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          tags: api:ci
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend (GH cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          tags: web:ci
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy — backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: api:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy — frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: web:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF — backend
        uses: github/codeql-action/upload-sarif@v3
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload Trivy SARIF — frontend
        uses: github/codeql-action/upload-sarif@v3
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Blue/green deploy simulation + health checks
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          set -euo pipefail
          echo "## Blue/green simulation" >> "$GITHUB_STEP_SUMMARY"
          docker rm -f api-active api-candidate 2>/dev/null || true
          echo "Starting active slot (blue) on port 5000..."
          docker run -d --name api-active -p 5000:5000 api:ci
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:5000/" >/dev/null 2>&1; then echo "Active health OK"; break; fi
            sleep 2
            if [ "$i" -eq 45 ]; then echo "Active slot failed to become healthy"; docker logs api-active; exit 1; fi
          done
          echo "Deploying candidate (green) on port 5001..."
          docker run -d --name api-candidate -p 5001:5000 api:ci
          CANDIDATE_OK=0
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:5001/" >/dev/null 2>&1; then CANDIDATE_OK=1; break; fi
            sleep 2
          done
          if [ "$CANDIDATE_OK" != "1" ]; then
            echo "::error::Candidate health check failed — rolling back (stopping candidate only)"
            echo "**Rollback:** candidate removed; active slot unchanged." >> "$GITHUB_STEP_SUMMARY"
            docker logs api-candidate || true
            docker rm -f api-candidate
            exit 1
          fi
          echo "Candidate healthy. Promoting: retire active, keep traffic on promoted instance."
          docker stop api-active || true
          docker rm -f api-active
          docker rm -f api-candidate
          docker run -d --name api-active -p 5000:5000 api:ci
          curl -fsS "http://127.0.0.1:5000/" >/dev/null
          echo "**Promoted** new revision to active port 5000 (simulated switch)." >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Discord / monitoring on failure
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test-shard
      - e2e-playwright
      - security-dependencies
      - docker-images
      - snyk
    if: always()

    steps:
      - name: Summarize workflow
        run: |
          echo "## Workflow ${{ github.run_id }} result" >> "$GITHUB_STEP_SUMMARY"
          echo "- frontend-build: ${{ needs.frontend-build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- backend-test-shard: ${{ needs.backend-test-shard.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- e2e-playwright: ${{ needs.e2e-playwright.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- security-dependencies: ${{ needs.security-dependencies.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- docker-images: ${{ needs.docker-images.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- snyk: ${{ needs.snyk.result }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Discord notification on failure
        if: >
          (needs.frontend-build.result == 'failure' ||
           needs.backend-test-shard.result == 'failure' ||
           needs.e2e-playwright.result == 'failure' ||
           needs.security-dependencies.result == 'failure' ||
           needs.docker-images.result == 'failure' ||
           (needs.snyk.result == 'failure' && vars.ENABLE_SNYK == 'true'))
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret — skipping Discord (set secret to enable alerts)."
            exit 0
          fi
          payload=$(jq -n \
            --arg content "❌ **${{ github.repository }}** — **${{ github.workflow }}** failed on \`${{ github.ref_name }}\` (\`${{ github.sha }}\`)\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{content: $content}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$DISCORD_WEBHOOK_URL"
